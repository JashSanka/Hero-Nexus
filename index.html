<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>hero-nexus</title>
    <link rel="stylesheet" href="src/style.css">
  </head>
  <body>
    <div id="app">
      <nav id="navi">
        <div class="logo">Hero-Nexus</div>
        <div class="nav-right">
          <a href="#">Home</a>
          <a href="#">Favourites</a>
          <a href="#">Sign In</a>
        </div>
      </nav>
      <aside id="sidebar" class="hidden">
      <h3>Categories</h3>
      <button>Avengers</button>
      <button>X-Men</button>
      <button>Guardians</button>
      <button>Inhumans</button>
      <button>Fantastic Four</button>
    </aside>

    <section id="landing">
      <h1 class="main-logo">Hero Nexus</h1>

      <div class="search-container">
        <input type="text" id="searchInput" placeholder="Search Marvel Characters..." />
        <button id="searchBtn">Search</button>
      </div>
    </section>

    <section id="results-section" class="hidden">
      <div id="results"></div>
    </section>

     <footer>
      <p>Hero Nexus • Made with ❤️ for Nerds by a Nerd</p>
    </footer>
    </div>
  <script type="module" src="/src/main.js"></script>
  </body>
</html>
